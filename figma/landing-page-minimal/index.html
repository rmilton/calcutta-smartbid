<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mothership Session Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #04111f;
        --bg-glow: rgba(34, 88, 176, 0.28);
        --panel: rgba(9, 22, 39, 0.9);
        --panel-border: rgba(142, 173, 224, 0.16);
        --text: #f3f7fb;
        --muted: #8ea0bd;
        --viewer: #d8ff69;
        --viewer-text: #102100;
        --field: #06101d;
        --field-border: rgba(127, 153, 199, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          radial-gradient(circle at top, var(--bg-glow), transparent 34%),
          linear-gradient(180deg, #03101c 0%, var(--bg) 48%, #020914 100%);
        color: var(--text);
        font-family: "Space Grotesk", sans-serif;
      }

      .shell {
        width: min(100%, 460px);
      }

      .card {
        position: relative;
        overflow: hidden;
        border-radius: 28px;
        border: 1px solid var(--panel-border);
        background: linear-gradient(180deg, rgba(15, 31, 55, 0.96), var(--panel));
        box-shadow:
          0 30px 80px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
        padding: 28px;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at top right, rgba(216, 255, 105, 0.08), transparent 28%),
          linear-gradient(135deg, rgba(64, 130, 255, 0.08), transparent 45%);
        pointer-events: none;
      }

      .brand {
        margin: 0 0 22px;
        color: #d8ff69;
        font: 500 12px/1.2 "IBM Plex Mono", monospace;
        letter-spacing: 0.28em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3.2rem);
        line-height: 0.92;
        letter-spacing: -0.06em;
      }

      .tier-row {
        display: flex;
        gap: 10px;
        margin: 22px 0 28px;
        flex-wrap: wrap;
      }

      .tier {
        border-radius: 999px;
        padding: 10px 14px;
        border: 1px solid transparent;
        background: rgba(255, 255, 255, 0.03);
        color: var(--muted);
        font: 500 0.83rem/1 "IBM Plex Mono", monospace;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .tier--viewer {
        background: var(--viewer);
        color: var(--viewer-text);
      }

      .tier--operator {
        border-color: rgba(216, 255, 105, 0.22);
        color: #d9e4f5;
      }

      .tier--admin {
        opacity: 0.62;
      }

      form {
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 9px;
      }

      .label {
        color: var(--muted);
        font: 500 0.78rem/1 "IBM Plex Mono", monospace;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        border: 1px solid var(--field-border);
        background: var(--field);
        color: var(--text);
        border-radius: 18px;
        padding: 17px 18px;
        font: 500 1rem/1.2 "Space Grotesk", sans-serif;
        outline: none;
      }

      input::placeholder {
        color: #5f7396;
      }

      button {
        margin-top: 6px;
        border: 0;
        border-radius: 18px;
        padding: 17px 20px;
        background: var(--viewer);
        color: var(--viewer-text);
        font: 700 1rem/1 "Space Grotesk", sans-serif;
        cursor: pointer;
      }

      .footer {
        margin-top: 18px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted);
        font: 500 0.8rem/1.4 "IBM Plex Mono", monospace;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      @media (max-width: 520px) {
        body {
          padding: 18px;
        }

        .card {
          padding: 22px;
          border-radius: 24px;
        }

        .footer {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <p class="brand">Mothership</p>
        <h1>Join session</h1>

        <div class="tier-row" aria-label="access priority">
          <div class="tier tier--viewer">Viewer</div>
          <div class="tier tier--operator">Operator</div>
          <div class="tier tier--admin">Platform admin</div>
        </div>

        <form>
          <label>
            <span class="label">Email</span>
            <input type="email" placeholder="name@domain.com" />
          </label>

          <label>
            <span class="label">Code</span>
            <input type="text" placeholder="Shared code" />
          </label>

          <button type="button">Enter</button>
        </form>

        <div class="footer">
          <span>Email + code</span>
          <span>One room</span>
        </div>
      </section>
    </main>
  </body>
</html>
